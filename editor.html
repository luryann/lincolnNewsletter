<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — The Railsplitter</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ede8;color:#1a1916;font-size:14px;height:100vh;overflow:hidden;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;font-size:13px;}

/* ── Layout ── */
.shell{display:flex;height:100vh;}
.sidebar{width:210px;background:#1a1916;display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content-area{flex:1;overflow-y:auto;padding:24px;}

/* ── Sidebar ── */
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid #2a2a2a;}
.sidebar-brand-name{font-size:15px;font-weight:700;color:#fff;}
.sidebar-brand-sub{font-size:11px;color:#888;margin-top:2px;}
.sidebar-nav{flex:1;padding:10px 0;}
.nav-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#555;padding:14px 16px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;color:#aaa;font-size:13px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:#2a2a2a;color:#fff;}
.nav-item.active{background:#C85500;color:#fff;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.sidebar-footer{padding:12px 16px;border-top:1px solid #2a2a2a;font-size:11px;color:#555;}
.sidebar-footer strong{color:#888;}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:5px;font-size:13px;font-weight:500;border:none;}
.btn-primary{background:#C85500;color:#fff;}
.btn-secondary{background:#f0ede8;color:#444;border:1px solid #ddd;}
.btn-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ── Cards ── */
.card{background:#fff;border-radius:8px;border:1px solid #e8e5e0;padding:20px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:16px;}

/* ── Form fields ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;border:1px solid #ddd;border-radius:5px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1a1916;background:#fafaf7;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#C85500;background:#fff;}
.field textarea{resize:vertical;min-height:70px;}

/* ── Notice / status ── */
.notice{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:16px;}
.notice-error{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;}
.notice-success{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.notice-warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.badge-pub{background:#dcfce7;color:#166534;}
.badge-draft{background:#fff7ed;color:#9a3412;}

/* ── Settings view ── */
.settings-wrap{max-width:520px;}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:10px;padding:24px;width:480px;max-width:90vw;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* ── Spinner ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#C85500;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Push bar ── */
#pushBar{background:#292622;color:#e0ddd8;padding:6px 24px;display:none;align-items:center;justify-content:space-between;font-size:12px;flex-shrink:0;border-bottom:1px solid #111;}
#pushBar .push-label{display:flex;align-items:center;gap:8px;}
#pushBar .push-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0;}
.btn-push{background:#C85500;color:#fff;padding:4px 14px;border-radius:4px;font-size:12px;font-weight:600;border:none;cursor:pointer;}
.btn-push:disabled{opacity:.5;cursor:not-allowed;}

/* ── Article editor ── */
.editor-grid{display:grid;grid-template-columns:1fr 280px;gap:20px;}
.richtext-wrap{border:1px solid #ddd;border-radius:5px;overflow:hidden;background:#fafaf7;}
.richtext-toolbar{background:#f5f2ed;border-bottom:1px solid #ddd;padding:5px 8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.rt-btn{padding:3px 8px;border:1px solid transparent;border-radius:3px;font-size:12px;background:none;color:#444;}
.rt-btn:hover{background:#e8e5e0;border-color:#ccc;}
.rt-btn-sep{width:1px;background:#ddd;margin:0 4px;align-self:stretch;}
.richtext-body{min-height:320px;padding:14px;font-size:15px;line-height:1.75;outline:none;}
.richtext-body:empty::before{content:'Start writing, or paste from Google Docs\2026';color:#aaa;pointer-events:none;}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.ph-swatch{border:2px solid transparent;border-radius:5px;padding:5px;font-size:11px;text-align:center;cursor:pointer;background:none;}
.ph-swatch.selected{border-color:#C85500;}
.ph-preview{height:24px;border-radius:3px;margin-bottom:4px;}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:none;}
.status-pub{background:#dcfce7;color:#166534;}
.status-draft{background:#fff7ed;color:#9a3412;}

/* ── Homepage editor ── */
.hp-slot{border:2px dashed #e0ddd8;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;background:#fafaf7;margin-bottom:8px;}
.hp-slot.hero-slot{border-color:#C85500;background:#fff8f4;}
.hp-slot-ph{width:64px;height:42px;border-radius:4px;flex-shrink:0;}
.hp-slot-info{flex:1;}
.hp-slot-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#C85500;margin-bottom:2px;}
.hp-slot-hed{font-size:13px;font-weight:600;line-height:1.3;}
.hp-slot-meta{font-size:11px;color:#888;margin-top:2px;}
.hp-slot-change{font-size:12px;color:#C85500;cursor:pointer;text-decoration:underline;white-space:nowrap;background:none;border:none;padding:0;}
.sec-grid-row{margin-bottom:20px;}
.sec-grid-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-grid-row-title{font-size:13px;font-weight:600;}
.slot-list{display:flex;flex-direction:column;gap:6px;}
.picker-list{max-height:320px;overflow-y:auto;border:1px solid #e8e5e0;border-radius:6px;margin-top:8px;}
.picker-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f0ede8;cursor:pointer;}
.picker-item:last-child{border-bottom:none;}
.picker-item:hover{background:#fff8f4;}
.picker-item-hed{font-size:13px;font-weight:500;}
.picker-item-meta{font-size:11px;color:#888;margin-top:2px;}

/* ── Section manager ── */
.sec-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ede8;}
.sec-row:last-child{border-bottom:none;}
.sec-drag{color:#ccc;cursor:grab;font-size:18px;line-height:1;}
.sec-info{flex:1;}
.sec-title-input{border:1px solid transparent;border-radius:4px;padding:4px 6px;font-size:13px;font-weight:500;font-family:inherit;background:none;width:160px;}
.sec-title-input:focus{border-color:#C85500;background:#fff;outline:none;}
.sec-slug{font-size:11px;color:#aaa;margin-top:2px;}
.ph-dot{width:14px;height:14px;border-radius:50%;display:inline-block;flex-shrink:0;}
.color-picker-row{display:flex;gap:6px;margin-top:6px;}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.selected{border-color:#1a1916;}
/* ── Issues view ── */
.issue-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0ede8;}
.staff-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.staff-row input{flex:1;padding:6px 8px;border:1px solid #e0ddd8;border-radius:5px;font-size:13px;font-family:inherit;}
.issue-row:last-child{border-bottom:none;}
.issue-info{flex:1;}
.issue-title{font-size:14px;font-weight:600;}
.issue-meta{font-size:11px;color:#aaa;margin-top:2px;}
.issue-actions{display:flex;gap:6px;}
.assign-list{max-height:360px;overflow-y:auto;border:1px solid #e8e5e0;border-radius:6px;margin-top:8px;}
.assign-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0ede8;cursor:pointer;}
.assign-item:last-child{border-bottom:none;}
.assign-item:hover{background:#fff8f4;}
.assign-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.assign-item-info{flex:1;}
.assign-item-hed{font-size:13px;font-weight:500;}
.assign-item-meta{font-size:11px;color:#888;margin-top:2px;}

/* ── Photo upload panel ── */
.photo-panel{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0ede8;}
.photo-preview{width:100%;height:90px;object-fit:cover;border-radius:5px;margin-bottom:6px;display:block;}
.photo-ph-strip{width:100%;height:60px;background:#e8e5e0;border-radius:5px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;}
.photo-remove{font-size:11px;color:#b91c1c;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;}
</style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">The Railsplitter</div>
      <div class="sidebar-brand-sub">Editor</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Content</div>
      <button class="nav-item" data-view="articles">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm0 8a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2z"/></svg>
        All Articles
      </button>
      <button class="nav-item" data-view="homepage">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h3a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        Homepage
      </button>
      <button class="nav-item" data-view="sections">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
        Sections
      </button>
      <button class="nav-item" data-view="issues">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
        Issues
      </button>
      <button class="nav-item" data-view="staff">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 14.094A5.973 5.973 0 004 17v1H1v-1a3 3 0 013.75-2.906z"/></svg>
        Staff
      </button>
      <div class="nav-label">System</div>
      <button class="nav-item" data-view="settings">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        Settings
      </button>
    </nav>
    <div class="sidebar-footer" id="sidebarFooter">Not signed in</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Loading&hellip;</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div id="pushBar">
      <div class="push-label"><div class="push-dot"></div><span id="pushCount"></span></div>
      <button class="btn-push" id="pushAllBtn" onclick="App.pushAll()">Push all →</button>
    </div>
    <div class="content-area" id="contentArea">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script>
// ── App namespace ──────────────────────────────────────────────────────────
var App = {
  REPO_OWNER: 'luryann',
  REPO_NAME:  'lincolnNewsletter',
  CONTENT_PATH: 'content.json',

  state: {
    token:   null,
    sha:     null,
    content: null,
    view:    'articles',
    articleId: null,
    pendingChanges: []
  },

  markDirty: function(msg) {
    App.state.pendingChanges.push(msg);
    App.updatePushBar();
  },

  updatePushBar: function() {
    var bar = document.getElementById('pushBar');
    if (!bar) return;
    var n = App.state.pendingChanges.length;
    if (n === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    document.getElementById('pushCount').textContent =
      n + ' unsaved change' + (n === 1 ? '' : 's') + ' — push to publish';
  },

  pushAll: function() {
    var changes = App.state.pendingChanges;
    if (!changes.length) return;
    var btn = document.getElementById('pushAllBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Pushing…'; }
    var summary = changes.length === 1
      ? changes[0]
      : changes[0] + ' (and ' + (changes.length - 1) + ' more change' + (changes.length > 2 ? 's' : '') + ')';
    App.github.saveContent(summary).then(function() {
      App.showSuccess('Pushed ' + changes.length + ' change' + (changes.length === 1 ? '' : 's') + '.');
    }).catch(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = 'Push all →'; }
      App.handleApiError(err);
    });
  },

  // ── GitHub API ────────────────────────────────────────────────────────
  github: {
    apiBase: 'https://api.github.com',

    headers: function() {
      return {
        'Authorization': 'token ' + App.state.token,
        'Accept':        'application/vnd.github.v3+json',
        'Content-Type':  'application/json'
      };
    },

    getContent: function() {
      var url = App.github.apiBase + '/repos/' + App.REPO_OWNER + '/' + App.REPO_NAME +
                '/contents/' + App.CONTENT_PATH;
      return fetch(url, { headers: App.github.headers() }).then(function(r) {
        if (r.status === 401) throw new Error('AUTH_ERROR');
        if (!r.ok) throw new Error('HTTP_' + r.status);
        return r.json();
      }).then(function(data) {
        App.state.sha = data.sha;
        App.state.content = JSON.parse(atob(data.content.replace(/\n/g, '')));
        return App.state.content;
      });
    },

    saveContent: function(commitMessage) {
      var url = App.github.apiBase + '/repos/' + App.REPO_OWNER + '/' + App.REPO_NAME +
                '/contents/' + App.CONTENT_PATH;
      var body = JSON.stringify({
        message: commitMessage || 'Update content via Railsplitter Editor',
        content: btoa(unescape(encodeURIComponent(JSON.stringify(App.state.content, null, 2)))),
        sha:     App.state.sha
      });
      return fetch(url, { method: 'PUT', headers: App.github.headers(), body: body }).then(function(r) {
        if (r.status === 401) throw new Error('AUTH_ERROR');
        if (r.status === 409) throw new Error('SHA_CONFLICT');
        if (!r.ok) throw new Error('HTTP_' + r.status);
        return r.json();
      }).then(function(data) {
        App.state.sha = data.content.sha;
        App.state.pendingChanges = [];
        App.updatePushBar();
      });
    },

    uploadFile: function(path, base64content, message) {
      var url = App.github.apiBase + '/repos/' + App.REPO_OWNER + '/' + App.REPO_NAME + '/contents/' + path;
      return fetch(url, { headers: App.github.headers() }).then(function(r) {
        return r.ok ? r.json() : null;
      }).then(function(existing) {
        var body = { message: message, content: base64content };
        if (existing && existing.sha) body.sha = existing.sha;
        return fetch(url, { method: 'PUT', headers: App.github.headers(), body: JSON.stringify(body) });
      }).then(function(r) {
        if (r.status === 401) throw new Error('AUTH_ERROR');
        if (!r.ok) throw new Error('HTTP_' + r.status);
        return r.json();
      });
    },

    validateToken: function(token) {
      return fetch(App.github.apiBase + '/user', {
        headers: {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json'
        }
      }).then(function(r) {
        if (!r.ok) throw new Error('invalid');
        return r.json();
      });
    }
  },

  // ── Router ────────────────────────────────────────────────────────────
  router: {
    navigate: function(view, params) {
      App.state.view = view;
      if (params && params.articleId !== undefined) App.state.articleId = params.articleId;
      document.querySelectorAll('.nav-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset.view === view);
      });
      var renderer = App.views[view];
      if (renderer) renderer.render();
    }
  },

  // ── Helpers ───────────────────────────────────────────────────────────
  esc: function(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  articleById: function(id) {
    return App.state.content.articles.find(function(a) { return a.id === id; });
  },

  sectionBySlug: function(slug) {
    return App.state.content.sections.find(function(s) { return s.slug === slug; });
  },

  issueById: function(id) {
    var issues = App.state.content.issues || [];
    return issues.find(function(i) { return i.id === id; });
  },

  phColor: function(ph) {
    var map = {
      'img-ph--news':     '#b0c4de',
      'img-ph--features': '#c4a882',
      'img-ph--opinion':  '#d4a0a0',
      'img-ph--sports':   '#90a870',
      'img-ph--reviews':  '#b8a8c8',
      'img-ph--default':  '#cccccc'
    };
    return map[ph] || '#cccccc';
  },

  showError: function(msg) {
    var el = document.createElement('div');
    el.className = 'notice notice-error';
    el.id = 'globalNotice';
    el.textContent = msg;
    document.getElementById('contentArea').insertAdjacentElement('afterbegin', el);
    setTimeout(function() { var n = document.getElementById('globalNotice'); if (n) n.remove(); }, 5000);
  },

  showSuccess: function(msg) {
    var el = document.createElement('div');
    el.className = 'notice notice-success';
    el.id = 'globalNotice';
    el.textContent = msg;
    document.getElementById('contentArea').insertAdjacentElement('afterbegin', el);
    setTimeout(function() { var n = document.getElementById('globalNotice'); if (n) n.remove(); }, 3000);
  },

  handleApiError: function(err) {
    if (err.message === 'AUTH_ERROR') {
      App.router.navigate('settings');
      App.showError('Your token is invalid or expired. Please update it in Settings.');
    } else if (err.message === 'SHA_CONFLICT') {
      if (confirm('Someone else saved since you loaded. Reload to get the latest version?\n\n(Your unsaved changes will be lost.)')) {
        window.location.reload();
      }
    } else if (err.message === 'Failed to fetch' || err.message.includes('NetworkError')) {
      App.showError('You appear to be offline. Changes were not saved.');
    } else {
      App.showError('Error: ' + err.message);
    }
  },

  // ── Views (populated below) ───────────────────────────────────────────
  views: {},

  // ── Init ──────────────────────────────────────────────────────────────
  init: function() {
    document.querySelectorAll('.nav-item[data-view]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        App.router.navigate(btn.dataset.view);
      });
    });

      }).catch(function() {});
      App.router.navigate('articles');
    }).catch(function(err) {
      App.handleApiError(err);
    });
  }
};

// ── Paste sanitizer ────────────────────────────────────────────────────────
var Sanitizer = {
  ALLOWED_TAGS: ['P','STRONG','EM','H2','H3','BLOCKQUOTE','UL','OL','LI','A','BR'],

  sanitizeHTML: function(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    Sanitizer.cleanNode(tmp);
    return tmp.innerHTML;
  },

  cleanNode: function(node) {
    var i = 0;
    while (i < node.childNodes.length) {
      var child = node.childNodes[i];
      if (child.nodeType === 3) { i++; continue; }
      if (child.nodeType !== 1) { node.removeChild(child); continue; }
      var tag = child.tagName.toUpperCase();
      if (!Sanitizer.ALLOWED_TAGS.includes(tag)) {
        var frag = document.createDocumentFragment();
        while (child.firstChild) frag.appendChild(child.firstChild);
        node.replaceChild(frag, child);
        // Don't increment i — re-examine same position after unwrap
        continue;
      }
      Array.from(child.attributes).forEach(function(attr) {
        if (!(tag === 'A' && attr.name === 'href')) child.removeAttribute(attr.name);
      });
      Sanitizer.cleanNode(child);
      i++;
    }
  }
};

      a.title   = document.getElementById('f-title').value.trim();
      a.dek     = document.getElementById('f-dek').value.trim();
      a.author  = document.getElementById('f-author').value.trim();
      a.section = document.getElementById('f-section').value;

      }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = published ? 'Publish →' : 'Save Draft';
        App.handleApiError(err);
      });
    }

    document.getElementById('saveDraftBtn').addEventListener('click', function() { collectAndSave(false); });
    document.getElementById('publishBtn').addEventListener('click', function() { collectAndSave(true); });

    document.getElementById('contentArea').innerHTML =
      '<div class="card">' +
        '<div class="card-title">Hero — Main Story</div>' +
        '<div id="heroSlot">' + slotHTML(hp.hero, 'Hero', true) + '</div>' +
        '<div style="margin-top:16px;">' +
          '<div class="card-title">Hero — Side Stories</div>' +
          '<div id="asideSlots">' +
            [0,1,2].map(function(i) {
              return '<div data-aside-idx="' + i + '">' + slotHTML(hp.heroAside[i], 'Slot ' + (i+1), false) + '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card"><div class="card-title">Section Grids</div>' + secGridsHTML + '</div>';

    document.getElementById('contentArea').onclick = function(e) {
      var btn = e.target.closest('.hp-slot-change');
      if (!btn) return;

      var isHero   = !!e.target.closest('#heroSlot');
      var asideDiv = e.target.closest('[data-aside-idx]');
      var asideIdx = asideDiv ? parseInt(asideDiv.dataset.asideIdx) : null;
      var sec      = btn.dataset.sec;
      var idx      = btn.dataset.idx !== undefined ? parseInt(btn.dataset.idx) : null;

      App.views.homepage.openPicker(function(chosenId) {
        if (isHero) {
          App.state.content.homepage.hero = chosenId;
        } else if (asideIdx !== null) {
          App.state.content.homepage.heroAside[asideIdx] = chosenId;
        } else if (sec !== undefined && idx !== null) {
          if (!App.state.content.homepage.sections[sec]) App.state.content.homepage.sections[sec] = [];
          App.state.content.homepage.sections[sec][idx] = chosenId;
        }
        App.markDirty('Homepage: update slot');
        App.views.homepage.renderContent();
      });
    };
  },

  openPicker: function(onSelect) {
    var articles = App.state.content.articles.filter(function(a) { return a.published; });
    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML =
      '<div class="modal" style="max-height:80vh;display:flex;flex-direction:column;">' +
        '<h3>Choose Article</h3>' +
        '<input type="text" id="pickerSearch" placeholder="Search…" style="border:1px solid #ddd;border-radius:5px;padding:7px 10px;font-size:13px;margin-bottom:8px;">' +
        '<div class="picker-list" id="pickerList"></div>' +
        '<div class="modal-actions"><button class="btn btn-secondary" id="pickerCancel">Cancel</button></div>' +
      '</div>';
    document.body.appendChild(backdrop);

    function renderList(filter) {
      var filtered = articles.filter(function(a) {
        return !filter || a.title.toLowerCase().includes(filter.toLowerCase()) || a.author.toLowerCase().includes(filter.toLowerCase());
      });
      document.getElementById('pickerList').innerHTML = filtered.map(function(a) {
        var secObj = App.sectionBySlug(a.section) || {};
        return '<div class="picker-item" data-id="' + App.esc(a.id) + '">' +
          '<div><div class="picker-item-hed">' + App.esc(a.title) + '</div>' +
            '<div class="picker-item-meta">' + App.esc(a.author) + ' · ' + App.esc(secObj.title || '') + '</div></div>' +
          '<span style="font-size:11px;color:#C85500;">Select</span>' +
        '</div>';
      }).join('');
    }
    renderList('');

    document.getElementById('pickerSearch').addEventListener('input', function() { renderList(this.value); });
    document.getElementById('pickerList').addEventListener('click', function(e) {
      var item = e.target.closest('.picker-item');
      if (!item) return;
      backdrop.remove();
      onSelect(item.dataset.id);
    });
    document.getElementById('pickerCancel').addEventListener('click', function() { backdrop.remove(); });
  }
};

// ── Section Manager view ───────────────────────────────────────────────────
App.views.sections = {
  PH_OPTIONS: [
    { ph: 'img-ph--news',     label: 'News blue'      },
    { ph: 'img-ph--features', label: 'Features tan'   },
    { ph: 'img-ph--opinion',  label: 'Opinion red'    },
    { ph: 'img-ph--sports',   label: 'Sports green'   },
    { ph: 'img-ph--reviews',  label: 'Reviews purple' },
    { ph: 'img-ph--default',  label: 'Default gray'   }
  ],

  render: function() {
    document.getElementById('topbarTitle').textContent = 'Sections';
    document.getElementById('topbarActions').innerHTML =
      '<button class="btn btn-primary" id="addSectionBtn">+ Add Section</button>';
    App.views.sections.renderList();
    document.getElementById('addSectionBtn').addEventListener('click', function() {
      App.views.sections.openAddModal();
    });
  },

  renderList: function() {
    var sections = App.state.content.sections;
    var articles = App.state.content.articles;

    var rowsHTML = sections.map(function(sec) {
      var count = articles.filter(function(a) { return a.section === sec.slug; }).length;
      var colorDots = App.views.sections.PH_OPTIONS.map(function(opt) {
        return '<div class="color-dot' + (sec.ph === opt.ph ? ' selected' : '') + '" ' +
          'style="background:' + App.phColor(opt.ph) + ';" ' +
          'title="' + App.esc(opt.label) + '" ' +
          'data-slug="' + App.esc(sec.slug) + '" data-ph="' + App.esc(opt.ph) + '"></div>';
      }).join('');

      return '<div class="sec-row" data-slug="' + App.esc(sec.slug) + '">' +
        '<span class="sec-drag">⠿</span>' +
        '<span class="ph-dot" style="background:' + App.phColor(sec.ph) + ';"></span>' +
        '<div class="sec-info">' +
          '<input class="sec-title-input" value="' + App.esc(sec.title) + '" data-slug="' + App.esc(sec.slug) + '">' +
          '<div class="sec-slug">/' + App.esc(sec.slug) + ' · ' + count + ' article' + (count === 1 ? '' : 's') + '</div>' +
          '<div class="color-picker-row">' + colorDots + '</div>' +
        '</div>' +
        (count === 0
          ? '<button class="btn btn-danger sec-delete" data-slug="' + App.esc(sec.slug) + '" style="font-size:12px;">Delete</button>'
          : '<span style="font-size:11px;color:#aaa;">' + count + ' articles</span>'
        ) +
      '</div>';
    }).join('');

    document.getElementById('contentArea').innerHTML =
      '<div class="card"><div class="card-title">Manage Sections</div><div id="secList">' + rowsHTML + '</div></div>';

    document.querySelectorAll('.sec-title-input').forEach(function(input) {
      input.addEventListener('blur', function() {
        var slug = input.dataset.slug;
        var sec = App.sectionBySlug(slug);
        if (!sec || input.value.trim() === sec.title) return;
        sec.title = input.value.trim();
        App.markDirty('Rename section: ' + sec.title);
        App.views.sections.renderList();
      });
    });

    document.querySelectorAll('.color-dot').forEach(function(dot) {
      dot.addEventListener('click', function() {
        var sec = App.sectionBySlug(dot.dataset.slug);
        if (!sec) return;
        sec.ph = dot.dataset.ph;
        App.markDirty('Section placeholder: ' + sec.title);
        App.views.sections.renderList();
      });
    });

    document.querySelectorAll('.sec-delete').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var slug = btn.dataset.slug;
        var sec = App.sectionBySlug(slug);
        var affected = App.state.content.articles.filter(function(a) { return a.section === slug; });
        if (affected.length) {
          alert('Cannot delete: ' + affected.length + ' article(s) still reference this section. Reassign them first.');
          return;
        }
        if (!confirm('Delete section "' + sec.title + '"? This cannot be undone.')) return;
        App.state.content.sections = App.state.content.sections.filter(function(s) { return s.slug !== slug; });
        delete App.state.content.homepage.sections[slug];
        App.markDirty('Delete section: ' + sec.title);
        App.showSuccess('Section deleted (not yet pushed).');
        App.views.sections.renderList();
      });
    });
  },

  openAddModal: function() {
    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML =
      '<div class="modal">' +
        '<h3>Add Section</h3>' +
        '<div class="field"><label>Display Title</label><input type="text" id="newSecTitle" placeholder="e.g. Arts &amp; Culture"></div>' +
        '<div class="field"><label>URL Slug <span style="color:#aaa;font-weight:400;">(letters and hyphens only)</span></label>' +
          '<input type="text" id="newSecSlug" placeholder="e.g. arts"></div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" id="addSecCancel">Cancel</button>' +
          '<button class="btn btn-primary" id="addSecConfirm">Add Section</button>' +
        '</div>' +
        '<div id="addSecError" style="font-size:12px;color:#b91c1c;margin-top:8px;"></div>' +
      '</div>';
    document.body.appendChild(backdrop);

    document.getElementById('newSecTitle').addEventListener('input', function() {
      var slug = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      document.getElementById('newSecSlug').value = slug;
    });

    document.getElementById('addSecCancel').addEventListener('click', function() { backdrop.remove(); });
    document.getElementById('addSecConfirm').addEventListener('click', function() {
      var title = document.getElementById('newSecTitle').value.trim();
      var slug  = document.getElementById('newSecSlug').value.trim();
      var errEl = document.getElementById('addSecError');
      if (!title || !slug) { errEl.textContent = 'Both fields are required.'; return; }
      if (!/^[a-z0-9-]+$/.test(slug)) { errEl.textContent = 'Slug may only contain lowercase letters, numbers, and hyphens.'; return; }
      if (App.sectionBySlug(slug)) { errEl.textContent = 'A section with this slug already exists.'; return; }

      App.state.content.sections.push({ slug: slug, title: title, ph: 'img-ph--default' });
      App.state.content.homepage.sections[slug] = [];
      App.markDirty('Add section: ' + title);
      backdrop.remove();
      App.showSuccess('Section "' + title + '" added (not yet pushed).');
      App.views.sections.renderList();
    });
  }
};

// ── Issues view ────────────────────────────────────────────────────────────
App.views.issues = {
  render: function() {
    document.getElementById('topbarTitle').textContent = 'Issues';
    document.getElementById('topbarActions').innerHTML =
      '<button class="btn btn-primary" id="newIssueBtn">+ New Issue</button>';

    App.views.issues.renderList();

    document.getElementById('newIssueBtn').addEventListener('click', function() {
      App.views.issues.openCreateModal();
    });
  },

  renderList: function() {
    var issues = App.state.content.issues || [];
    var articles = App.state.content.articles;

    if (!issues.length) {
      document.getElementById('contentArea').innerHTML =
        '<div class="card"><p style="color:#888;font-size:13px;">No issues yet. Click "+ New Issue" to create one.</p></div>';
      return;
    }

    var rowsHTML = issues.map(function(issue) {
      var count = articles.filter(function(a){ return a.issueId === issue.id; }).length;
      return '<div class="issue-row">' +
        '<div class="issue-info">' +
          '<div class="issue-title">' + App.esc(issue.title) + ' &mdash; ' + App.esc(issue.date) + '</div>' +
          '<div class="issue-meta">' + count + ' article' + (count === 1 ? '' : 's') + ' &nbsp;&middot;&nbsp; Cover: ' +
            App.esc((App.articleById(issue.coverArticle) || {title: 'None'}).title) +
          '</div>' +
        '</div>' +
        '<div class="issue-actions">' +
          '<button class="btn btn-secondary issue-print" data-id="' + App.esc(issue.id) + '" style="font-size:12px;">Print</button>' +
          '<button class="btn btn-secondary issue-edit" data-id="' + App.esc(issue.id) + '" style="font-size:12px;">Edit</button>' +
          '<button class="btn btn-danger issue-delete" data-id="' + App.esc(issue.id) + '" style="font-size:12px;">Delete</button>' +
        '</div>' +
      '</div>';
    }).join('');

    document.getElementById('contentArea').innerHTML =
      '<div class="card" style="padding:0 20px;">' + rowsHTML + '</div>';

    document.querySelectorAll('.issue-print').forEach(function(btn) {
      btn.addEventListener('click', function() {
        window.open('print.html?issue=' + encodeURIComponent(btn.dataset.id), '_blank');
      });
    });

    document.querySelectorAll('.issue-edit').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var issue = App.issueById(btn.dataset.id);
        if (issue) App.views.issues.openEditModal(issue);
      });
    });

    document.querySelectorAll('.issue-delete').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var issue = App.issueById(btn.dataset.id);
        if (!issue) return;
        var count = App.state.content.articles.filter(function(a){ return a.issueId === issue.id; }).length;
        var msg = 'Delete "' + issue.title + '"?' + (count ? '\n\n' + count + ' article(s) will be unlinked from this issue (not deleted).' : '');
        if (!confirm(msg)) return;
        App.state.content.issues = App.state.content.issues.filter(function(i){ return i.id !== issue.id; });
        App.state.content.articles.forEach(function(a){ if (a.issueId === issue.id) a.issueId = null; });
        App.markDirty('Issues: delete ' + issue.title);
        App.showSuccess('Issue deleted (not yet pushed).');
        App.views.issues.renderList();
      });
    });
  },

  openCreateModal: function() {
    var articles = App.state.content.articles.filter(function(a){ return a.published; });
    var artOptions = articles.map(function(a) {
      return '<option value="' + App.esc(a.id) + '">' + App.esc(a.title) + '</option>';
    }).join('');

    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML =
      '<div class="modal">' +
        '<h3>New Issue</h3>' +
        '<div class="field"><label>Title (e.g. "Issue 7")</label><input type="text" id="mi-title" placeholder="Issue 7"></div>' +
        '<div class="field"><label>Date (e.g. "May 2026")</label><input type="text" id="mi-date" placeholder="May 2026"></div>' +
        '<div class="field"><label>Cover Article</label><select id="mi-cover"><option value="">— None —</option>' + artOptions + '</select></div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" id="mi-cancel">Cancel</button>' +
          '<button class="btn btn-primary" id="mi-save">Create Issue</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(backdrop);

    document.getElementById('mi-cancel').addEventListener('click', function() { backdrop.remove(); });
    document.getElementById('mi-save').addEventListener('click', function() {
      var title = document.getElementById('mi-title').value.trim();
      var date  = document.getElementById('mi-date').value.trim();
      var cover = document.getElementById('mi-cover').value;
      if (!title || !date) { alert('Title and date are required.'); return; }

      if (!App.state.content.issues) App.state.content.issues = [];
      var id = 'issue-' + title.toLowerCase().replace(/^issue[\s-]*/i, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      if (App.issueById(id)) { alert('An issue with this title already exists (ID: ' + id + ').'); return; }
      App.state.content.issues.unshift({ id: id, title: title, date: date, coverArticle: cover || null });
      App.markDirty('Issues: create ' + title);
      backdrop.remove();
      App.showSuccess('Issue created (not yet pushed).');
      App.views.issues.renderList();
    });
  },

  openEditModal: function(issue) {
    var articles = App.state.content.articles;
    var artOptions = App.state.content.articles
      .filter(function(a){ return a.published; })
      .map(function(a) {
        return '<option value="' + App.esc(a.id) + '"' + (issue.coverArticle === a.id ? ' selected' : '') + '>' + App.esc(a.title) + '</option>';
      }).join('');

    var assignItems = articles.map(function(a) {
      var checked = a.issueId === issue.id ? ' checked' : '';
      var secObj  = App.sectionBySlug(a.section) || {};
      return '<label class="assign-item">' +
        '<input type="checkbox" class="assign-check" data-id="' + App.esc(a.id) + '"' + checked + '>' +
        '<div class="assign-item-info">' +
          '<div class="assign-item-hed">' + App.esc(a.title) + '</div>' +
          '<div class="assign-item-meta">' + App.esc(a.author) + ' &nbsp;&middot;&nbsp; ' + App.esc(secObj.title || a.section) + '</div>' +
        '</div>' +
      '</label>';
    }).join('');

    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML =
      '<div class="modal" style="width:560px;max-height:85vh;display:flex;flex-direction:column;">' +
        '<h3>Edit Issue</h3>' +
        '<div style="overflow-y:auto;flex:1;">' +
          '<div class="field"><label>Title</label><input type="text" id="ei-title" value="' + App.esc(issue.title) + '"></div>' +
          '<div class="field"><label>Date</label><input type="text" id="ei-date" value="' + App.esc(issue.date) + '"></div>' +
          '<div class="field"><label>Cover Article</label><select id="ei-cover"><option value="">— None —</option>' + artOptions + '</select></div>' +
          '<div style="font-size:12px;font-weight:500;color:#555;margin-bottom:5px;">Articles in this Issue</div>' +
          '<div class="assign-list">' + assignItems + '</div>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" id="ei-cancel">Cancel</button>' +
          '<button class="btn btn-primary" id="ei-save">Save Changes</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(backdrop);

    document.getElementById('ei-cancel').addEventListener('click', function() { backdrop.remove(); });
    document.getElementById('ei-save').addEventListener('click', function() {
      issue.title        = document.getElementById('ei-title').value.trim();
      issue.date         = document.getElementById('ei-date').value.trim();
      issue.coverArticle = document.getElementById('ei-cover').value || null;

      document.querySelectorAll('.assign-check').forEach(function(cb) {
        var a = App.articleById(cb.dataset.id);
        if (!a) return;
        if (cb.checked) {
          a.issueId = issue.id;
        } else if (a.issueId === issue.id) {
          a.issueId = null;
        }
      });

      App.markDirty('Issues: update ' + issue.title);
      backdrop.remove();
      App.showSuccess('Issue saved (not yet pushed).');
      App.views.issues.renderList();
    });
  }
};

// ── Staff view ─────────────────────────────────────────────────────────────
App.views.staff = {
  render: function() {
    document.getElementById('topbarTitle').textContent = 'Staff';
    document.getElementById('topbarActions').innerHTML =
      '<button class="btn btn-primary" id="saveStaffBtn">Save Changes</button>';
    App.views.staff.renderContent();
    document.getElementById('saveStaffBtn').addEventListener('click', function() {
      App.views.staff.collectAndSave();
    });
  },

  defaultStaff: function() {
    return { leadership: [], photoCopy: [], writers: [] };
  },

  renderContent: function() {
    var s = App.state.content.staff || App.views.staff.defaultStaff();
    var lead    = s.leadership || [];
    var photoCopy = s.photoCopy || [];
    var writers = s.writers || [];

    function memberRows(members, group) {
      return members.map(function(m, i) {
        return '<div class="staff-row" data-group="' + group + '" data-i="' + i + '">' +
          '<input class="staff-f-name" type="text" placeholder="Name" value="' + App.esc(m.name || '') + '">' +
          '<input class="staff-f-role" type="text" placeholder="Role / Title" value="' + App.esc(m.role || '') + '">' +
          '<input class="staff-f-beat" type="text" placeholder="Beat / section" value="' + App.esc(m.beat || '') + '">' +
          '<button class="btn btn-danger staff-remove" style="font-size:11px;padding:4px 8px;">✕</button>' +
        '</div>';
      }).join('') +
      '<button class="btn btn-secondary staff-add-row" data-group="' + group + '" style="font-size:12px;margin-top:6px;">+ Add person</button>';
    }

    function writerRows(ws) {
      return ws.map(function(w, i) {
        return '<div class="staff-row" data-group="writers" data-i="' + i + '">' +
          '<input class="staff-f-name" type="text" placeholder="Name" value="' + App.esc(w.name || '') + '" style="flex:2;">' +
          '<input class="staff-f-beat" type="text" placeholder="Section" value="' + App.esc(w.section || '') + '" style="flex:1;">' +
          '<button class="btn btn-danger staff-remove" style="font-size:11px;padding:4px 8px;">✕</button>' +
        '</div>';
      }).join('') +
      '<button class="btn btn-secondary staff-add-row" data-group="writers" style="font-size:12px;margin-top:6px;">+ Add writer</button>';
    }

    document.getElementById('contentArea').innerHTML =
      '<div style="display:flex;flex-direction:column;gap:20px;">' +
        '<div class="card"><div class="card-title">Editorial Leadership</div>' +
          '<div style="font-size:12px;color:#888;margin-bottom:10px;">Editors-in-Chief, Editors, Faculty Advisor</div>' +
          '<div id="staff-leadership">' + memberRows(lead, 'leadership') + '</div>' +
        '</div>' +
        '<div class="card"><div class="card-title">Photo &amp; Copy</div>' +
          '<div id="staff-photoCopy">' + memberRows(photoCopy, 'photoCopy') + '</div>' +
        '</div>' +
        '<div class="card"><div class="card-title">Staff Writers</div>' +
          '<div style="font-size:12px;color:#888;margin-bottom:10px;">Name + section only</div>' +
          '<div id="staff-writers">' + writerRows(writers) + '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('contentArea').addEventListener('click', function(e) {
      if (e.target.classList.contains('staff-remove')) {
        e.target.closest('.staff-row').remove();
      }
      if (e.target.classList.contains('staff-add-row')) {
        var group = e.target.dataset.group;
        var row = document.createElement('div');
        row.className = 'staff-row';
        row.dataset.group = group;
        if (group === 'writers') {
          row.innerHTML =
            '<input class="staff-f-name" type="text" placeholder="Name" style="flex:2;">' +
            '<input class="staff-f-beat" type="text" placeholder="Section" style="flex:1;">' +
            '<button class="btn btn-danger staff-remove" style="font-size:11px;padding:4px 8px;">✕</button>';
        } else {
          row.innerHTML =
            '<input class="staff-f-name" type="text" placeholder="Name">' +
            '<input class="staff-f-role" type="text" placeholder="Role / Title">' +
            '<input class="staff-f-beat" type="text" placeholder="Beat / section">' +
            '<button class="btn btn-danger staff-remove" style="font-size:11px;padding:4px 8px;">✕</button>';
        }
        e.target.before(row);
      }
    });
  },

  collectAndSave: function() {
    function collectGroup(containerId, isWriter) {
      var rows = document.querySelectorAll('#' + containerId + ' .staff-row');
      var result = [];
      rows.forEach(function(row) {
        var name = (row.querySelector('.staff-f-name') || {}).value || '';
        if (!name.trim()) return;
        if (isWriter) {
          result.push({ name: name.trim(), section: ((row.querySelector('.staff-f-beat') || {}).value || '').trim() });
        } else {
          result.push({
            name: name.trim(),
            role: ((row.querySelector('.staff-f-role') || {}).value || '').trim(),
            beat: ((row.querySelector('.staff-f-beat') || {}).value || '').trim()
          });
        }
      });
      return result;
    }

    if (!App.state.content.staff) App.state.content.staff = {};
    App.state.content.staff.leadership = collectGroup('staff-leadership', false);
    App.state.content.staff.photoCopy  = collectGroup('staff-photoCopy', false);
    App.state.content.staff.writers    = collectGroup('staff-writers', true);

    var btn = document.getElementById('saveStaffBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    App.github.saveContent('Staff: update staff list').then(function() {
      App.showSuccess('Staff saved.');
      btn.disabled = false; btn.textContent = 'Save Changes';
    }).catch(function(err) {
      btn.disabled = false; btn.textContent = 'Save Changes';
      App.handleApiError(err);
    });
  }
};

// ── Bootstrap ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
